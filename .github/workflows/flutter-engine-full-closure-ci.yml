name: flutter-full-source-closure-ci

on:
  workflow_dispatch:
    inputs:
      flutter_ref:
        description: 'Flutter branch, tag, or commit to checkout before sync'
        required: false
        default: ''
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  pack-flutter-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      WORK_ROOT: ${{ github.workspace }}/flutter_engine_full
      FLUTTER_ROOT: ${{ github.workspace }}/flutter_engine_full/flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y xz-utils python3 curl unzip

      - name: Install depot_tools
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$RUNNER_TEMP/depot_tools"
          echo "$RUNNER_TEMP/depot_tools" >> "$GITHUB_PATH"

      - name: Verify required host tools
        shell: bash
        run: |
          set -euxo pipefail
          command -v git
          command -v python3
          command -v curl
          command -v unzip
          command -v gclient

      - name: Clone flutter/flutter
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$WORK_ROOT"
          cd "$WORK_ROOT"
          git clone https://github.com/flutter/flutter.git
          cd "$FLUTTER_ROOT"
          if [ -n "${{ github.event.inputs.flutter_ref }}" ]; then
            git checkout "${{ github.event.inputs.flutter_ref }}"
          fi
          git rev-parse HEAD | tee "$GITHUB_WORKSPACE/flutter_framework_commit.txt"
          git status --short > "$GITHUB_WORKSPACE/flutter_framework_git_status.txt" || true

      - name: Bootstrap gclient
        shell: bash
        working-directory: ${{ github.workspace }}/flutter_engine_full/flutter
        run: |
          set -euxo pipefail
          gclient bootstrap

      - name: Create standard .gclient
        shell: bash
        working-directory: ${{ github.workspace }}/flutter_engine_full/flutter
        run: |
          set -euxo pipefail
          cp engine/scripts/standard.gclient .gclient
          ls -l .gclient | tee "$GITHUB_WORKSPACE/flutter_gclient_ls.txt"

      - name: Sync full flutter source closure including engine
        shell: bash
        working-directory: ${{ github.workspace }}/flutter_engine_full/flutter
        run: |
          set -euxo pipefail
          gclient sync --no-history 2>&1 | tee "$GITHUB_WORKSPACE/gclient_sync.log"

      - name: Verify flutter workspace and engine structure
        shell: bash
        run: |
          set -euxo pipefail
          cd "$FLUTTER_ROOT"
          test -f .gclient && echo GCLIENT_OK
          test -d engine && echo ENGINE_DIR_OK
          test -d dev && echo DEV_DIR_OK
          test -d packages && echo PACKAGES_OK
          test -d bin && echo BIN_OK

          cd "$FLUTTER_ROOT/engine/src"
          test -d build && echo BUILD_OK
          test -d flutter && echo FLUTTER_OK
          test -d third_party && echo THIRD_PARTY_OK
          test -d runtime && echo RUNTIME_OK
          test -d skia && echo SKIA_OK
          test -d third_party/abseil-cpp && echo ABSL_OK
          test -d third_party/dart -o -d flutter/third_party/dart && echo DART_PATH_OK
          test -d flutter/third_party/gn -o -f flutter/third_party/gn/gn && echo GN_OK

      - name: Record metadata and tree snapshots
        shell: bash
        run: |
          set -euxo pipefail
          cd "$FLUTTER_ROOT"
          find . -maxdepth 3 \( -name DEPS -o -name .gclient \) | sort > "$GITHUB_WORKSPACE/flutter_metadata_paths.txt"
          find . -maxdepth 2 -type d | sort > "$GITHUB_WORKSPACE/flutter_top_dirs.txt"
          {
            echo '# flutter root top-level entries'
            find . -maxdepth 1 -mindepth 1 | sort
            echo
            echo '# flutter/engine/src top-level entries'
            find engine/src -maxdepth 1 -mindepth 1 | sort
            echo
            echo '# flutter/engine/src/third_party top-level entries'
            find engine/src/third_party -maxdepth 1 -mindepth 1 \( -type d -o -type l \) | sort
          } > "$GITHUB_WORKSPACE/flutter_workspace_inventory.txt"

      - name: Prepare CI outputs
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf "$GITHUB_WORKSPACE/ci_outputs"
          mkdir -p "$GITHUB_WORKSPACE/ci_outputs"

          cp -f "$GITHUB_WORKSPACE/flutter_framework_commit.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f "$GITHUB_WORKSPACE/flutter_framework_git_status.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f "$GITHUB_WORKSPACE/flutter_gclient_ls.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f "$GITHUB_WORKSPACE/gclient_sync.log" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f "$GITHUB_WORKSPACE/flutter_metadata_paths.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f "$GITHUB_WORKSPACE/flutter_top_dirs.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f "$GITHUB_WORKSPACE/flutter_workspace_inventory.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true

      - name: Pack full flutter source tree as tar.xz
        shell: bash
        working-directory: ${{ github.workspace }}/flutter_engine_full
        run: |
          set -euxo pipefail
          tar -cJf "$GITHUB_WORKSPACE/ci_outputs/flutter_full_source_closure.tar.xz" flutter

      - name: Upload CI outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-full-source-closure-outputs
          path: ci_outputs/
          if-no-files-found: error
          retention-days: 14