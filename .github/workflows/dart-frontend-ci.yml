name: dart-frontend-ci

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y xz-utils

      - name: Checkout Dart SDK 3.12.2 with depot_tools
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$RUNNER_TEMP/depot_tools"
          export PATH="$RUNNER_TEMP/depot_tools:$PATH"

          mkdir -p "$GITHUB_WORKSPACE/dart-sdk-full"
          cd "$GITHUB_WORKSPACE/dart-sdk-full"

          fetch dart
          cd sdk
          git checkout 3.12.2
          gclient sync -D

          git rev-parse HEAD > "$GITHUB_WORKSPACE/dart_sdk_commit.txt"
          dart --version 2>&1 | tee "$GITHUB_WORKSPACE/dart_version.txt"

      - name: Verify key source directories
        shell: bash
        working-directory: dart-sdk-full/sdk
        run: |
          set -euxo pipefail
          test -d pkg/frontend_server
          test -d pkg/front_end
          test -d pkg/kernel
          test -d pkg/vm
          test -d pkg/compiler
          test -d pkg/dev_compiler
          test -d pkg/dart2wasm
          test -d pkg/build_integration
          test -d pkg/_fe_analyzer_shared
          test -d pkg/_js_interop_checks
          test -d third_party/pkg

      - name: Build hello world Android arm64 AOT snapshot
        id: hello_aot
        shell: bash
        working-directory: dart-sdk-full/sdk
        run: |
          set -euxo pipefail
          cat > /tmp/aot_hello.dart <<'EOF'
          void main() {
            print('hello ext aot');
          }
          EOF

          dart compile aot-snapshot \
            --target-os=android \
            --target-arch=arm64 \
            -o /tmp/aot_hello.aot \
            /tmp/aot_hello.dart

          cp /tmp/aot_hello.aot "$GITHUB_WORKSPACE/aot_hello_android_arm64.aot"

      - name: Try direct frontend_server Android arm64 AOT build
        id: frontend_direct
        shell: bash
        working-directory: dart-sdk-full/sdk
        continue-on-error: true
        run: |
          set -euxo pipefail
          dart compile aot-snapshot \
            --target-os=android \
            --target-arch=arm64 \
            --packages=.dart_tool/package_config.json \
            -o /tmp/frontend_server_android_arm64.aot \
            pkg/frontend_server/bin/frontend_server_starter.dart

          cp /tmp/frontend_server_android_arm64.aot "$GITHUB_WORKSPACE/frontend_server_android_arm64.aot"

      - name: Try official build target fallback
        id: frontend_official
        if: steps.frontend_direct.outcome != 'success'
        shell: bash
        working-directory: dart-sdk-full/sdk
        continue-on-error: true
        run: |
          set -euxo pipefail
          python3 tools/build.py -m release -a arm64 create_sdk
          python3 tools/build.py -m release -a arm64 runtime || true
          python3 tools/build.py -m release -a arm64 frontend_server_aot || true

          find out -name 'frontend_server_aot.dart.snapshot' | sort | tee "$GITHUB_WORKSPACE/frontend_server_snapshot_candidates.txt"

          candidate="$(find out -name 'frontend_server_aot.dart.snapshot' | sort | head -n1 || true)"
          if [ -n "$candidate" ]; then
            cp "$candidate" "$GITHUB_WORKSPACE/frontend_server_aot.dart.snapshot"
          else
            echo 'No frontend_server_aot.dart.snapshot found' >&2
            exit 1
          fi

      - name: Prepare closure package directories
        shell: bash
        working-directory: dart-sdk-full/sdk
        run: |
          set -euxo pipefail
          rm -rf "$GITHUB_WORKSPACE/ci_outputs"
          mkdir -p "$GITHUB_WORKSPACE/ci_outputs"

          cp -f "$GITHUB_WORKSPACE/dart_sdk_commit.txt" "$GITHUB_WORKSPACE/ci_outputs/"
          cp -f "$GITHUB_WORKSPACE/dart_version.txt" "$GITHUB_WORKSPACE/ci_outputs/"
          cp -f "$GITHUB_WORKSPACE/aot_hello_android_arm64.aot" "$GITHUB_WORKSPACE/ci_outputs/"

          if [ -f "$GITHUB_WORKSPACE/frontend_server_android_arm64.aot" ]; then
            cp -f "$GITHUB_WORKSPACE/frontend_server_android_arm64.aot" "$GITHUB_WORKSPACE/ci_outputs/"
          fi

          if [ -f "$GITHUB_WORKSPACE/frontend_server_aot.dart.snapshot" ]; then
            cp -f "$GITHUB_WORKSPACE/frontend_server_aot.dart.snapshot" "$GITHUB_WORKSPACE/ci_outputs/"
          fi

          if [ -f "$GITHUB_WORKSPACE/frontend_server_snapshot_candidates.txt" ]; then
            cp -f "$GITHUB_WORKSPACE/frontend_server_snapshot_candidates.txt" "$GITHUB_WORKSPACE/ci_outputs/"
          fi

      - name: Pack minimal closure as tar.xz
        shell: bash
        working-directory: dart-sdk-full/sdk
        run: |
          set -euxo pipefail
          tar -cJf "$GITHUB_WORKSPACE/ci_outputs/dart_frontend_closure_3.12.2.tar.xz" \
            pkg/frontend_server \
            pkg/front_end \
            pkg/kernel \
            pkg/vm \
            pkg/compiler \
            pkg/dev_compiler \
            pkg/dart2wasm \
            pkg/build_integration \
            pkg/_fe_analyzer_shared \
            pkg/_js_interop_checks \
            third_party/pkg \
            third_party/devtools

      - name: Pack full workspace as tar.xz
        shell: bash
        working-directory: dart-sdk-full/sdk
        run: |
          set -euxo pipefail
          tar -cJf "$GITHUB_WORKSPACE/ci_outputs/dart_pkg_workspace_3.12.2.tar.xz" \
            pkg \
            third_party/pkg \
            third_party/devtools

      - name: Upload CI outputs
        uses: actions/upload-artifact@v4
        with:
          name: dart-frontend-ci-outputs
          path: ci_outputs/
          if-no-files-found: error
          retention-days: 14
