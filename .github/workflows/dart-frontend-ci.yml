name: dart-full-workspace-pack-ci

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  pack-workspace:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      DART_VERSION: 3.12.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y xz-utils

      - name: Set up host Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.12.2

      - name: Record host Dart SDK info
        shell: bash
        run: |
          set -euxo pipefail
          which dart | tee "$GITHUB_WORKSPACE/host_dart_path.txt"
          dart --version 2>&1 | tee "$GITHUB_WORKSPACE/dart_version.txt"

      - name: Checkout full Dart workspace with depot_tools
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$RUNNER_TEMP/depot_tools"
          export PATH="$RUNNER_TEMP/depot_tools:$PATH"

          mkdir -p "$GITHUB_WORKSPACE/dart-sdk-full"
          cd "$GITHUB_WORKSPACE/dart-sdk-full"

          fetch dart
          cd sdk
          git checkout "$DART_VERSION"
          gclient sync -D

          git rev-parse HEAD > "$GITHUB_WORKSPACE/dart_sdk_commit.txt"
          git status --short > "$GITHUB_WORKSPACE/dart_sdk_git_status.txt" || true

      - name: Verify workspace root files and key directories
        shell: bash
        working-directory: dart-sdk-full/sdk
        run: |
          set -euxo pipefail
          test -f pubspec.yaml
          test -f DEPS
          test -d pkg
          test -d runtime
          test -d sdk
          test -d third_party
          test -d tools
          test -d pkg/frontend_server
          test -d third_party/pkg
          test -d third_party/devtools

      - name: Record workspace inventory
        shell: bash
        working-directory: dart-sdk-full/sdk
        run: |
          set -euxo pipefail
          {
            echo '# workspace root entries'
            find . -maxdepth 1 -mindepth 1 | sort
            echo
            echo '# top-level pkg directories'
            find pkg -maxdepth 1 -mindepth 1 -type d | sort
            echo
            echo '# top-level third_party directories'
            find third_party -maxdepth 1 -mindepth 1 -type d | sort
          } | tee "$GITHUB_WORKSPACE/source_tree_inventory.txt"

      - name: Prepare CI outputs
        if: always()
        shell: bash
        working-directory: dart-sdk-full/sdk
        run: |
          set -euxo pipefail
          rm -rf "$GITHUB_WORKSPACE/ci_outputs"
          mkdir -p "$GITHUB_WORKSPACE/ci_outputs"

          cp -f "$GITHUB_WORKSPACE/dart_sdk_commit.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f "$GITHUB_WORKSPACE/dart_sdk_git_status.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f "$GITHUB_WORKSPACE/dart_version.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f "$GITHUB_WORKSPACE/host_dart_path.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f "$GITHUB_WORKSPACE/source_tree_inventory.txt" "$GITHUB_WORKSPACE/ci_outputs/" || true
          cp -f pubspec.yaml "$GITHUB_WORKSPACE/ci_outputs/dart_sdk_pubspec.yaml" || true
          cp -f DEPS "$GITHUB_WORKSPACE/ci_outputs/dart_sdk_DEPS" || true
      - name: Pack full Dart workspace source as tar.xz
        shell: bash
        working-directory: dart-sdk-full
        run: |
          set -euxo pipefail
          tar -cJf "$GITHUB_WORKSPACE/ci_outputs/dart_full_workspace_${DART_VERSION}.tar.xz" \
            --exclude='sdk/buildtools' \
            --exclude='sdk/buildtools/**' \
            sdk


      - name: Upload CI outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-full-workspace-outputs
          path: ci_outputs/
          if-no-files-found: error
          retention-days: 14
